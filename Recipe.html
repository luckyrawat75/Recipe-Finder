<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Finder</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #fff8ef;
      }

      /* HERO SECTION */
      .container {
        width: 100%;
        min-height: 50vh;
        background:
          linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
          url("Images/web.avif") center/cover no-repeat;
        padding: 60px 20px;
        text-align: center;
        color: #fff;
      }

      .container h2 {
        font-size: 32px;
        font-weight: 600;
      }

      .container p {
        margin-top: 10px;
        font-size: 18px;
      }

      /* SEARCH */
      .searchbox {
        max-width: 600px;
        margin: 20px auto;
        display: flex;
        justify-content: center;
      }

      .searchbox input {
        padding: 12px;
        width: 70%;
        border: none;
        outline: none;
        border-radius: 10px 0 0 10px;
      }

      .searchbox button {
        padding: 12px 20px;
        border: none;
        background: crimson;
        color: #fff;
        cursor: pointer;
        border-radius: 0 10px 10px 0;
        transition: 0.3s;
      }

      .searchbox button:hover {
        background: darkred;
      }

      /* RECIPES GRID */
      .recipes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px 20px;
        max-width: 1200px;
        margin: auto;
      }

      .recipe-card {
        background: #fff;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
        text-align: center;
      }

      .recipe-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .recipe-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
      }

      .recipe-card h3 {
        margin: 15px;
        font-size: 18px;
      }

      .recipe-card button {
        margin-bottom: 15px;
        padding: 8px 15px;
        border: none;
        background: crimson;
        color: white;
        border-radius: 20px;
        cursor: pointer;
      }

      /* NOT FOUND */
      .notfound {
        text-align: center;
        font-size: 20px;
        margin-top: 20px;
      }

      /* LOADER */
      .loader {
        display: none;
        width: 60px;
        height: 60px;
        border: 6px solid #f3f3f3;
        border-top: 6px solid crimson;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 40px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* MODAL */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        padding: 20px;
        z-index: 1000;
      }

      .modal-content {
        background: #fff;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 15px;
        padding: 25px;
        position: relative;
        animation: popup 0.3s ease;
      }

      @keyframes popup {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .close-btn {
        position: absolute;
        right: 15px;
        top: 10px;
        font-size: 25px;
        cursor: pointer;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .searchbox {
          flex-direction: column;
          gap: 10px;
        }

        .searchbox input,
        .searchbox button {
          width: 100%;
          border-radius: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Discover Delicious Recipes</h2>
      <p>
        Search thousands of mouth-watering recipes and cook something amazing
        today.
      </p>

      <div class="searchbox">
        <input type="text" id="recipe" placeholder="Enter recipe name" />
        <button id="btn">Search</button>
      </div>
    </div>

    <div class="recipes" id="recipes"></div>
    <div class="loader" id="loader"></div>
    <div class="notfound" id="notfound">Search your favorite recipes 🍲</div>

    <!-- MODAL -->
    <div class="modal" id="recipeModal">
      <div class="modal-content">
        <span class="close-btn" id="closeBtn">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      const btn = document.getElementById("btn");
      const recipeContainer = document.getElementById("recipes");
      const notfound = document.getElementById("notfound");
      const loader = document.getElementById("loader");
      const modal = document.getElementById("recipeModal");
      const modalBody = document.getElementById("modalBody");
      const closeBtn = document.getElementById("closeBtn");

      btn.addEventListener("click", searchRecipe);

      closeBtn.addEventListener("click", () => (modal.style.display = "none"));

      window.addEventListener("click", (e) => {
        if (e.target === modal) {
          modal.style.display = "none";
        }
      });

      async function searchRecipe() {
        const inputdata = document.getElementById("recipe").value.trim();

        if (inputdata === "") {
          alert("Please enter recipe name");
          return;
        }

        recipeContainer.innerHTML = "";
        notfound.innerText = "";
        loader.style.display = "block";

        try {
          const response = await fetch(
            `https://www.themealdb.com/api/json/v1/1/search.php?s=${inputdata}`,
          );

          const data = await response.json();

          loader.style.display = "none";

          if (!data.meals) {
            notfound.innerText = "Recipe not found 😢";
            return;
          }

          data.meals.forEach((meal) => {
            const card = document.createElement("div");
            card.classList.add("recipe-card");

            card.innerHTML = `
        <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
        <h3>${meal.strMeal}</h3>
        <button class="view-btn">View Recipe</button>
      `;

            card.querySelector(".view-btn").addEventListener("click", () => {
              let ingredients = "";

              for (let i = 1; i <= 20; i++) {
                if (meal["strIngredient" + i]) {
                  ingredients += `<li>${meal["strIngredient" + i]} - ${meal["strMeasure" + i]}</li>`;
                }
              }

              modalBody.innerHTML = `
          <h2>${meal.strMeal}</h2>
          <img src="${meal.strMealThumb}" style="width:100%;border-radius:10px;margin:15px 0;">
          <h3>Ingredients:</h3>
          <ul>${ingredients}</ul>
          <h3>Instructions:</h3>
          <p>${meal.strInstructions}</p>
        `;

              modal.style.display = "flex";
            });

            recipeContainer.appendChild(card);
          });
        } catch (error) {
          loader.style.display = "none";
          notfound.innerText = "Something went wrong ❌";
        }
      }
    </script>
  </body>
</html>
